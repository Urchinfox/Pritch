<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign up</title>
  <script type="module" crossorigin src="/Pritch/assets/main-217e5801.js"></script>
  <link rel="stylesheet" href="/Pritch/assets/main-0040a906.css">
</head>
<body>
    <h1 class="header">我是 header</h1>
<a href="index.html">index</a>
<a href="about.html">about</a>
<a href="contact.html">contact</a>
    <section class="login">
        <div class="container my-12">
                <div class="row justify-content-center">
                    <div class="col-6">
                        <div class="border py-11 px-5 rounded-5 border-primary">
                            <form class="row">
                                <h2 class="col-12 text-center">MY PRITCH ACCOUNT</h2>
                                <div class="col-md-12">
                                <label for="usarName" class="form-label"></label>
                                <input type="text" class="outline-0 form-control" id="usarName" required placeholder="使用者名稱 *">
                                </div>
                                <div class="col-md-12">
                                    <label for="inputEmail4" class="form-label"></label>
                                    <input type="email" class="outline-0 form-control" id="inputEmail4" required placeholder="Email *">
                                </div>
                                <div class="col-md-12">
                                <label for="inputPassword4" class="form-label"></label>
                                <input type="password" class="outline-0 form-control" id="inputPassword4" required placeholder="Password *">
                                </div>
                                <div class="col-12">
                                <label for="tel" class="form-label"></label>
                                <input type="tel" class="outline-0 form-control" id="tel" placeholder="電話 *" required>
                                </div>
                                <div class="col-12 d-flex justify-content-around">
                                    <div>
                                        <label for="City" class="form-label"></label>
                                        <select id="City" class="w-auto form-select" required>
                                        <option selected>城市...</option>
                                        <option>台北市</option>
                                        <option>桃園市</option>
                                        <option>新竹市</option>
                                        <option>苗栗市</option>
                                        <option>高雄市</option>
                                        </select>
                                    </div>
                                    <div>
                                        <label for="Religion" class="form-label"></label>
                                        <select id="Religion" class="form-select w-auto" required>
                                        <option selected>地區...</option>
                                        <option>永和區</option>
                                        </select>
                                    </div>
                                    <div>
                                        <label for="inputZip" class="form-label"></label>
                                        <input type="text" class="outline-0 form-control" id="inputZip" placeholder="郵寄區號 *" required>
                                    </div>
                                </div>
                                <div class="col-12">
                                <label for="inputAddress" class="form-label"></label>
                                <input type="text" class="outline-0 form-control" id="inputAddress" placeholder="街道名稱 *">
                                </div>
                
                                <div class="col-12 mt-5">
                                    <button type="submit" class="w-100 btn btn-primary">註冊</button>
                                </div>
    
                                <div class="col text-center my-8">
                                    <p>
                                        <small>使用您的電子郵件地址註冊 </small><br>
                                        <small><a href="login.html">已經是會員？<u>使用您的電子郵件和密碼登錄</a></u></small>
                                    </p>
                                    <p><small>or</small></p>
                                </div>
                                <div class="col-12">
                                    <button type="#" class="mb-6 w-100 btn btn-primary">使用google帳號登入</button>
                                    <button type="#" class="w-100 btn btn-primary">使用Facebook帳號登入</button>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
        </div>

    </section>


    <footer class="footer">我是 footer</footer>
    
</body>
</html>
