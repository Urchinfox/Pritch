<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile</title>
</head>
<body>
    <%- include('./layout/header'); -%>
    <div class="container">
        <div class="row align-items-start">
            <div class="col-4">
                <div class="nav flex-column nav-pills me-3" id="v-pills-tab">
                  <button class="text-start nav-link active" id="v-pills-home-tab" data-bs-toggle="pill" data-bs-target="#v-products" type="button">所有商品</button>
                  <button class="text-start nav-link" id="v-pills-profile-tab" data-bs-toggle="pill" data-bs-target="#v-orders" type="button">所有訂單</button>
                  <button class="text-start nav-link" id="v-pills-messages-tab" data-bs-toggle="pill" data-bs-target="#v-comments" type="button">查看評論</button>
                  <button class="text-start nav-link" id="v-pills-settings-tab" data-bs-toggle="pill" data-bs-target="#v-stylist" type="button">造型師預約</button>
                  <button class="text-start nav-link" id="v-pills-settings-tab" data-bs-toggle="pill" data-bs-target="#v-members" type="button">所有會員</button>
                </div>
            </div>
    
            <div class="col-8">
                <div class="tab-content" id="v-pills-tabContent">
                  <div class="tab-pane fade show active" id="v-products">
                    <div>
                        <form action="">
                            <div class="d-flex justify-content-betweenq">
                                <div>
                                    <a href="createProduct.html" class="btn btn-primary">+新增商品</a>
                                    <a href="addCategory.html" class="btn btn-primary">+新增分類</a>
                                    <a href="addAttribute.html" class="btn btn-primary">+新增屬性</a>
                                </div>
                                <input class="ms-auto" type="search" placeholder="搜尋品項">
                            </div>
                            <div class="d-flex">
                                <select class="form-select form-select-sm">
                                    <option selected>主分類</option>
                                    <option value="1">One</option>
                                    <option value="2">Two</option>
                                    <option value="3">Three</option>
                                </select>
                                <select class="form-select form-select-sm">
                                    <option selected>次分類</option>
                                    <option value="1">One</option>
                                    <option value="2">Two</option>
                                    <option value="3">Three</option>
                                </select>
                                  <select class="form-select form-select-sm">
                                    <option selected>次分類</option>
                                    <option value="1">One</option>
                                    <option value="2">Two</option>
                                    <option value="3">Three</option>
                                  </select>
                                <select class="form-select form-select-sm">
                                    <option selected>次分類</option>
                                    <option value="1">One</option>
                                    <option value="2">Two</option>
                                    <option value="3">Three</option>
                                </select>
                            </div>

                        </form>

                        <table class="table">
                            <thead>
                              <tr>
                                <th scope="col">產品名稱</th>
                                <th scope="col">貨號</th>
                                <th scope="col">價格</th>
                                <th scope="col">分類</th>
                                <th scope="col">發布日期</th>

                              </tr>
                            </thead>
                            <tbody>
                              <tr class="align-middle">
                                <th scope="row">高調洋裝
                                    <div>
                                        <small><a href="createProduct.html">編輯</a></small>
                                        <!-- Button trigger modal -->
                                        <small><a class="text-decoration" type="button" data-bs-toggle="modal" data-bs-target="#deleteProduct">
                                            刪除
                                        </a></small>
                                        <!-- Modal -->
                                        <div class="modal fade" id="deleteProduct">
                                            <div class="modal-dialog">
                                            <div class="modal-content">
                                                <div class="modal-header border-0">
                                                <h5 class="modal-title" id="exampleModalLabel"><i class="bi bi-exclamation-triangle"></i></h5>
                                                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                                                </div>
                                                <div class="modal-body">
                                                <p class="text-center">是否確定刪除此商品？</p>
                                                </div>
                                                <div class="modal-footer border-0">
                                                    <button type="button" class="btn btn-primary">確定</button>
                                                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                                                </div>
                                            </div>
                                            </div>
                                        </div>
                                    </div>
                                </th>
                                <td>000</td>
                                <td>1500$</td>
                                <td>洋裝</td>
                                <td>08/09/2024</td>
                              </tr>
                              <tr class="align-middle">
                                <th scope="row">低調洋裝
                                    <div>
                                        <small><a href="createProduct.html">編輯</a></small>
                                        <!-- Button trigger modal -->
                                        <small><a class="text-decoration" type="button" data-bs-toggle="modal" data-bs-target="#deleteProduct">
                                            刪除
                                        </a></small>
                                        <!-- Modal -->
                                        <div class="modal fade" id="deleteProduct">
                                            <div class="modal-dialog">
                                            <div class="modal-content">
                                                <div class="modal-header border-0">
                                                <h5 class="modal-title" id="exampleModalLabel"><i class="bi bi-exclamation-triangle"></i></h5>
                                                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                                                </div>
                                                <div class="modal-body">
                                                <p class="text-center">是否確定刪除此商品？</p>
                                                </div>
                                                <div class="modal-footer border-0">
                                                    <button type="button" class="btn btn-primary">確定</button>
                                                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                                                </div>
                                            </div>
                                            </div>
                                        </div>
                                    </div>
                                </th>
                                <td>001</td>
                                <td>3000$</td>
                                <td>洋裝</td>
                                <td>08/09/2024</td>
                              </tr>
                            </tbody>
                          </table>
                    </div>


                  </div>
                  <div class="tab-pane fade" id="v-orders" >...</div>
                  <div class="tab-pane fade" id="v-comments">...</div>
                  <div class="tab-pane fade" id="v-stylist">...</div>
                  <div class="tab-pane fade" id="v-members">...</div>

                </div>
            </div>
          </div>
    
    </div>






    


      <script type="module" src="../main.js"></script>
</body>
</html>
